<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹球</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .hud {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
            color: white;
            font-size: 24px;
        }

        #gameCanvas {
            display: block;
            border: 4px solid #333;
            border-radius: 10px;
            background: #000;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .overlay p {
            font-size: 24px;
            margin: 10px 0;
        }

        .btn {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: 20px;
            background: #e91e63;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="hud">
        <div>🎯 <span id="score">0</span></div>
        <div style="color:#e91e63;">🏀 <span id="balls">3</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div id="start" class="overlay">
        <h2>🎮 弹球</h2>
        <p>发射弹球，击打目标得分!</p>
        <p>不要让球掉落!</p>
        <button class="btn" onclick="startGame()">开始游戏</button>
    </div>

    <div id="gameover" class="overlay hidden">
        <h2>游戏结束</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <button class="btn" onclick="startGame()">再来一次</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 400;
        canvas.height = 600;

        let ball = null;
        let paddle = { x: 200, width: 80, height: 15 };
        let bumpers = [];
        let targets = [];
        let score = 0;
        let balls = 3;
        let gameRunning = false;
        let launched = false;

        function initLevel() {
            bumpers = [
                { x: 100, y: 200, radius: 30 },
                { x: 300, y: 200, radius: 30 },
                { x: 200, y: 320, radius: 30 },
                { x: 80, y: 400, radius: 25 },
                { x: 320, y: 400, radius: 25 }
            ];

            targets = [];
            for (let i = 0; i < 3; i++) {
                targets.push({
                    x: 80 + i * 120,
                    y: 80 + Math.random() * 60,
                    width: 60,
                    height: 20,
                    hits: 0
                });
            }
        }

        function resetBall() {
            ball = {
                x: paddle.x,
                y: canvas.height - 50,
                vx: 0,
                vy: 0,
                radius: 10
            };
            launched = false;
        }

        function drawPaddle() {
            const y = canvas.height - 30;

            // Paddle glow
            ctx.shadowColor = '#e91e63';
            ctx.shadowBlur = 15;

            ctx.fillStyle = '#e91e63';
            ctx.beginPath();
            ctx.roundRect(paddle.x - paddle.width / 2, y, paddle.width, paddle.height, 8);
            ctx.fill();

            ctx.shadowBlur = 0;
        }

        function drawBall() {
            if (!ball) return;

            // Ball trail
            ctx.fillStyle = 'rgba(233, 30, 99, 0.3)';
            ctx.beginPath();
            ctx.arc(ball.x - ball.vx * 2, ball.y - ball.vy * 2, ball.radius * 0.8, 0, Math.PI * 2);
            ctx.fill();

            // Ball
            const gradient = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 0, ball.x, ball.y, ball.radius);
            gradient.addColorStop(0, '#fff');
            gradient.addColorStop(0.5, '#e91e63');
            gradient.addColorStop(1, '#c2185b');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawBumpers() {
            bumpers.forEach(b => {
                // Outer glow
                ctx.shadowColor = '#00bcd4';
                ctx.shadowBlur = 20;

                const gradient = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.radius);
                gradient.addColorStop(0, '#00bcd4');
                gradient.addColorStop(1, '#006064');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();

                // Inner circle
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius * 0.4, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 0;
            });
        }

        function drawTargets() {
            targets.forEach(t => {
                const colors = ['#4caf50', '#ff9800', '#f44336'];
                ctx.fillStyle = colors[Math.min(t.hits, 2)];

                ctx.beginPath();
                ctx.roundRect(t.x - t.width / 2, t.y, t.width, t.height, 5);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText((3 - t.hits) * 100, t.x, t.y + 15);
            });
        }

        function drawWalls() {
            // Side walls
            ctx.fillStyle = '#333';
            ctx.fillRect(0, 0, 10, canvas.height);
            ctx.fillRect(canvas.width - 10, 0, 10, canvas.height);

            // Top wall
            ctx.fillRect(0, 0, canvas.width, 10);

            // Launch guide
            if (!launched && ball) {
                ctx.strokeStyle = 'rgba(233, 30, 99, 0.5)';
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(ball.x, ball.y);
                ctx.lineTo(ball.x, ball.y - 100);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        function launch() {
            if (launched || !ball) return;
            ball.vx = (Math.random() - 0.5) * 4;
            ball.vy = -10;
            launched = true;
        }

        function update() {
            if (!ball || !launched) return;

            // Apply physics
            ball.vy += 0.1; // Gravity
            ball.x += ball.vx;
            ball.y += ball.vy;

            // Wall collision
            if (ball.x < 10 + ball.radius) {
                ball.x = 10 + ball.radius;
                ball.vx *= -0.9;
            }
            if (ball.x > canvas.width - 10 - ball.radius) {
                ball.x = canvas.width - 10 - ball.radius;
                ball.vx *= -0.9;
            }
            if (ball.y < 10 + ball.radius) {
                ball.y = 10 + ball.radius;
                ball.vy *= -0.9;
            }

            // Paddle collision
            if (ball.y > canvas.height - 45 && ball.y < canvas.height - 20 &&
                ball.x > paddle.x - paddle.width / 2 - ball.radius &&
                ball.x < paddle.x + paddle.width / 2 + ball.radius) {
                ball.vy = -Math.abs(ball.vy) - 2;
                ball.vx += (ball.x - paddle.x) * 0.1;
            }

            // Bumper collision
            bumpers.forEach(b => {
                const dx = ball.x - b.x;
                const dy = ball.y - b.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < b.radius + ball.radius) {
                    const angle = Math.atan2(dy, dx);
                    ball.vx = Math.cos(angle) * 8;
                    ball.vy = Math.sin(angle) * 8;
                    score += 50;
                    b.radius = b.radius * 1.2; // Bounce animation
                    setTimeout(() => b.radius /= 1.2, 100);
                }
            });

            // Target collision
            targets.forEach(t => {
                if (ball.x > t.x - t.width / 2 - ball.radius &&
                    ball.x < t.x + t.width / 2 + ball.radius &&
                    ball.y > t.y - ball.radius &&
                    ball.y < t.y + t.height + ball.radius) {

                    ball.vy *= -1;
                    if (t.hits < 3) {
                        score += (3 - t.hits) * 100;
                        t.hits++;
                    }
                }
            });

            // Ball lost
            if (ball.y > canvas.height + 50) {
                balls--;
                document.getElementById('balls').textContent = balls;

                if (balls <= 0) {
                    gameOver();
                } else {
                    resetBall();
                }
            }

            document.getElementById('score').textContent = score;
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameover').classList.remove('hidden');
        }

        function startGame() {
            score = 0;
            balls = 3;
            gameRunning = true;

            document.getElementById('score').textContent = '0';
            document.getElementById('balls').textContent = '3';
            document.getElementById('start').classList.add('hidden');
            document.getElementById('gameover').classList.add('hidden');

            initLevel();
            resetBall();
            gameLoop();
        }

        function gameLoop() {
            if (!gameRunning) return;

            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawWalls();
            drawTargets();
            drawBumpers();
            drawPaddle();
            drawBall();
            update();

            requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            paddle.x = Math.max(paddle.width / 2 + 10,
                Math.min(canvas.width - paddle.width / 2 - 10, e.clientX - rect.left));

            if (!launched && ball) {
                ball.x = paddle.x;
            }
        });

        canvas.addEventListener('click', launch);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') launch();
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            paddle.x = Math.max(paddle.width / 2 + 10,
                Math.min(canvas.width - paddle.width / 2 - 10, touch.clientX - rect.left));

            if (!launched && ball) {
                ball.x = paddle.x;
            }
        });
    </script>
    <script src="../../js/game-i18n.js"></script>
</body>

</html>
