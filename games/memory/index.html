<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆翻牌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            color: white;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 25px;
            border-radius: 25px;
            backdrop-filter: blur(5px);
        }

        .stat span {
            font-weight: bold;
            font-size: 20px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 500px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .card {
            width: 100px;
            height: 100px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            animation: matched 0.5s ease;
        }

        @keyframes matched {

            0%,
            100% {
                transform: rotateY(180deg) scale(1);
            }

            50% {
                transform: rotateY(180deg) scale(1.1);
            }
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .card-front {
            background: linear-gradient(145deg, #6366f1 0%, #4f46e5 100%);
            color: white;
        }

        .card-front::after {
            content: '?';
            font-size: 36px;
            font-weight: bold;
        }

        .card-back {
            background: white;
            transform: rotateY(180deg);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay.hidden {
            display: none;
        }

        .modal {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal h2 {
            color: #4f46e5;
            margin-bottom: 20px;
        }

        .modal p {
            color: #666;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .modal .highlight {
            font-size: 48px;
            color: #10b981;
            margin: 20px 0;
        }

        .btn {
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(145deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .restart-btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .restart-btn:hover {
            background: white;
            color: #4f46e5;
        }

        @media (max-width: 500px) {
            .game-board {
                gap: 10px;
                padding: 15px;
            }

            .card {
                width: 70px;
                height: 70px;
            }

            .card-face {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <h1>🃏 记忆翻牌</h1>

    <div class="stats">
        <div class="stat">步数: <span id="moves">0</span></div>
        <div class="stat">配对: <span id="pairs">0</span>/8</div>
        <div class="stat">时间: <span id="timer">0:00</span></div>
    </div>

    <div class="game-board" id="game-board"></div>

    <button class="restart-btn" onclick="initGame()">🔄 重新开始</button>

    <div id="win-overlay" class="overlay hidden">
        <div class="modal">
            <h2>🎉 恭喜过关!</h2>
            <p>你成功配对了所有卡片!</p>
            <div class="highlight" id="final-moves">0</div>
            <p>步</p>
            <p>用时: <span id="final-time">0:00</span></p>
            <button class="btn" onclick="initGame()">再玩一次</button>
        </div>
    </div>

    <script>
        const emojis = ['🎮', '🎲', '🎯', '🎨', '🎪', '🎭', '🎵', '🎸'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let timer = 0;
        let timerInterval = null;
        let gameStarted = false;
        let canFlip = true;

        function shuffle(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function createCard(emoji, index) {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.emoji = emoji;
            card.dataset.index = index;
            card.innerHTML = `
                <div class="card-face card-front"></div>
                <div class="card-face card-back">${emoji}</div>
            `;
            card.addEventListener('click', () => flipCard(card));
            return card;
        }

        function flipCard(card) {
            if (!canFlip) return;
            if (card.classList.contains('flipped')) return;
            if (card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;

            if (!gameStarted) {
                gameStarted = true;
                startTimer();
            }

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const match = card1.dataset.emoji === card2.dataset.emoji;

            canFlip = false;

            if (match) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                document.getElementById('pairs').textContent = matchedPairs;
                flippedCards = [];
                canFlip = true;

                if (matchedPairs === 8) {
                    setTimeout(showWin, 500);
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timer++;
                const minutes = Math.floor(timer / 60);
                const seconds = timer % 60;
                document.getElementById('timer').textContent =
                    `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function showWin() {
            stopTimer();
            const minutes = Math.floor(timer / 60);
            const seconds = timer % 60;
            document.getElementById('final-moves').textContent = moves;
            document.getElementById('final-time').textContent =
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('win-overlay').classList.remove('hidden');
        }

        function initGame() {
            // 重置状态
            stopTimer();
            cards = [];
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            timer = 0;
            gameStarted = false;
            canFlip = true;

            // 更新UI
            document.getElementById('moves').textContent = '0';
            document.getElementById('pairs').textContent = '0';
            document.getElementById('timer').textContent = '0:00';
            document.getElementById('win-overlay').classList.add('hidden');

            // 创建卡片
            const gameBoard = document.getElementById('game-board');
            gameBoard.innerHTML = '';

            const cardPairs = [...emojis, ...emojis];
            const shuffledCards = shuffle(cardPairs);

            shuffledCards.forEach((emoji, index) => {
                const card = createCard(emoji, index);
                gameBoard.appendChild(card);
            });
        }

        // 初始化游戏
        initGame();
    </script>
    <script src="../../js/game-i18n.js"></script>
</body>

</html>
