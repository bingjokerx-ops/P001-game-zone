<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            color: white;
            font-size: 42px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .score-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 25px;
            border-radius: 8px;
            text-align: center;
            color: white;
        }

        .score-box .label {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .score-box .value {
            font-size: 24px;
            font-weight: bold;
        }

        canvas {
            background: #1a1a2e;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .game-over {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .game-over.show {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over h2 {
            font-size: 48px;
            color: white;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 24px;
            color: #38ef7d;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #1a1a2e;
            background: #38ef7d;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(56, 239, 125, 0.4);
        }

        .controls {
            margin-top: 20px;
            color: white;
            opacity: 0.8;
            font-size: 14px;
        }

        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 10px;
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            font-size: 24px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }

        .mobile-btn:active {
            background: rgba(255, 255, 255, 0.4);
        }

        @media (max-width: 500px) {
            canvas {
                width: 320px;
                height: 320px;
            }

            .mobile-controls {
                display: grid;
                grid-template-columns: repeat(3, 60px);
                grid-template-rows: repeat(2, 60px);
            }

            .mobile-btn.up {
                grid-column: 2;
            }

            .mobile-btn.left {
                grid-column: 1;
                grid-row: 2;
            }

            .mobile-btn.down {
                grid-column: 2;
                grid-row: 2;
            }

            .mobile-btn.right {
                grid-column: 3;
                grid-row: 2;
            }
        }
    </style>
</head>

<body>
    <h1>🐍 贪吃蛇</h1>

    <div class="score-container">
        <div class="score-box">
            <div class="label">分数</div>
            <div class="value" id="score">0</div>
        </div>
        <div class="score-box">
            <div class="label">最高分</div>
            <div class="value" id="best">0</div>
        </div>
    </div>

    <canvas id="game" width="400" height="400"></canvas>

    <div class="mobile-controls">
        <button class="mobile-btn up" onclick="changeDirection('up')">↑</button>
        <button class="mobile-btn left" onclick="changeDirection('left')">←</button>
        <button class="mobile-btn down" onclick="changeDirection('down')">↓</button>
        <button class="mobile-btn right" onclick="changeDirection('right')">→</button>
    </div>

    <p class="controls">使用方向键控制蛇的移动</p>

    <div class="game-over" id="game-over">
        <h2>游戏结束!</h2>
        <p>得分: <span id="final-score">0</span></p>
        <button class="btn" onclick="startGame()">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let best = parseInt(localStorage.getItem('snake-best')) || 0;
        let gameLoop;
        let gameSpeed = 100;

        const scoreElement = document.getElementById('score');
        const bestElement = document.getElementById('best');
        const gameOverElement = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');

        function startGame() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            gameSpeed = 100;
            scoreElement.textContent = score;
            bestElement.textContent = best;
            gameOverElement.classList.remove('show');
            spawnFood();

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, gameSpeed);
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // 确保食物不在蛇身上
            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) {
                    spawnFood();
                    return;
                }
            }
        }

        function update() {
            direction = nextDirection;

            // 移动蛇头
            const head = { x: snake[0].x, y: snake[0].y };

            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }

            // 检查碰撞墙壁
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 检查碰撞自己
            for (let part of snake) {
                if (head.x === part.x && head.y === part.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                spawnFood();

                // 加速
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, gameSpeed);
                }
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 画网格
            ctx.strokeStyle = '#2a2a4e';
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 画蛇
            snake.forEach((part, index) => {
                const gradient = ctx.createRadialGradient(
                    part.x * gridSize + gridSize / 2,
                    part.y * gridSize + gridSize / 2,
                    0,
                    part.x * gridSize + gridSize / 2,
                    part.y * gridSize + gridSize / 2,
                    gridSize / 2
                );

                if (index === 0) {
                    gradient.addColorStop(0, '#38ef7d');
                    gradient.addColorStop(1, '#11998e');
                } else {
                    gradient.addColorStop(0, '#2ecc71');
                    gradient.addColorStop(1, '#27ae60');
                }

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    part.x * gridSize + 1,
                    part.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    4
                );
                ctx.fill();
            });

            // 画食物
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        function gameOver() {
            clearInterval(gameLoop);

            if (score > best) {
                best = score;
                localStorage.setItem('snake-best', best);
                bestElement.textContent = best;
            }

            finalScoreElement.textContent = score;
            gameOverElement.classList.add('show');
            // 向父页面发送分数
            window.parent.postMessage({ type: 'gameScore', score: score, game: 'snake' }, '*');
        }

        function changeDirection(dir) {
            const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
            if (dir !== opposites[direction]) {
                nextDirection = dir;
            }
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            const keyMap = {
                ArrowUp: 'up',
                ArrowDown: 'down',
                ArrowLeft: 'left',
                ArrowRight: 'right'
            };

            if (keyMap[e.key]) {
                e.preventDefault();
                changeDirection(keyMap[e.key]);
            }
        });

        // 开始游戏
        startGame();
    </script>
    <script src="../../js/game-i18n.js"></script>
</body>

</html>
