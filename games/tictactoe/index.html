<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>井字棋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
        }

        h1 {
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .status {
            font-size: 24px;
            margin-bottom: 20px;
            padding: 10px 30px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 30px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 10px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 15px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 10px;
            font-size: 48px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cell:hover {
            transform: scale(1.05);
            background: white;
        }

        .cell.x {
            color: #e74c3c;
        }

        .cell.o {
            color: #3498db;
        }

        .cell.win {
            animation: pulse 0.5s ease infinite alternate;
        }

        @keyframes pulse {
            to {
                transform: scale(1.1);
            }
        }

        .btn {
            margin-top: 25px;
            padding: 12px 35px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.9);
            color: #764ba2;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .score {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
        }

        .score-item {
            text-align: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .score-item span {
            font-size: 28px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>⭕ 井字棋 ❌</h1>
    <div class="score">
        <div class="score-item">X: <span id="scoreX">0</span></div>
        <div class="score-item">O: <span id="scoreO">0</span></div>
    </div>
    <div class="status" id="status">轮到 X</div>
    <div class="board" id="board"></div>
    <button class="btn" onclick="resetGame()">重新开始</button>

    <script>
        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        let scoreX = 0, scoreO = 0;
        const winPatterns = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function createBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('button');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.onclick = () => handleClick(i);
                boardEl.appendChild(cell);
            }
        }

        function handleClick(index) {
            if (!gameActive || board[index]) return;
            board[index] = currentPlayer;
            updateBoard();
            if (checkWin()) {
                document.getElementById('status').textContent = `${currentPlayer} 获胜! 🎉`;
                if (currentPlayer === 'X') scoreX++; else scoreO++;
                updateScore();
                gameActive = false;
            } else if (board.every(cell => cell)) {
                document.getElementById('status').textContent = '平局! 🤝';
                gameActive = false;
            } else {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                document.getElementById('status').textContent = `轮到 ${currentPlayer}`;
            }
        }

        function updateBoard() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, i) => {
                cell.textContent = board[i];
                cell.className = 'cell' + (board[i] ? ` ${board[i].toLowerCase()}` : '');
            });
        }

        function checkWin() {
            for (const pattern of winPatterns) {
                const [a, b, c] = pattern;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    document.querySelectorAll('.cell').forEach((cell, i) => {
                        if (pattern.includes(i)) cell.classList.add('win');
                    });
                    return true;
                }
            }
            return false;
        }

        function updateScore() {
            document.getElementById('scoreX').textContent = scoreX;
            document.getElementById('scoreO').textContent = scoreO;
        }

        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            document.getElementById('status').textContent = '轮到 X';
            updateBoard();
        }

        createBoard();
    </script>
    <script src="../../js/game-i18n.js"></script>
</body>

</html>
