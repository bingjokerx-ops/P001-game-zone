<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>切水果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }

        .hud {
            position: fixed;
            top: 20px;
            display: flex;
            gap: 40px;
            color: white;
            font-size: 24px;
            z-index: 100;
        }

        .lives {
            color: #ff4444;
        }

        #gameCanvas {
            display: block;
            cursor: crosshair;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 200;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .overlay p {
            font-size: 24px;
            margin: 10px 0;
        }

        .btn {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: 20px;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="hud">
        <div>🎯 <span id="score">0</span></div>
        <div class="lives">❌ <span id="misses">0</span>/3</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div id="start" class="overlay">
        <h2>🍉 切水果</h2>
        <p>滑动切开水果!</p>
        <p>避开炸弹! 💣</p>
        <button class="btn" onclick="startGame()">开始游戏</button>
    </div>

    <div id="gameover" class="overlay hidden">
        <h2>游戏结束</h2>
        <p>得分: <span id="finalScore">0</span></p>
        <p style="color:#ffd700;">最高分: <span id="bestScore">0</span></p>
        <button class="btn" onclick="startGame()">再来一次</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 600;
        canvas.height = 500;

        const fruitEmojis = ['🍎', '🍊', '🍋', '🍉', '🍇', '🍓', '🥝', '🍑'];
        let fruits = [];
        let slices = [];
        let particles = [];
        let trail = [];
        let score = 0;
        let misses = 0;
        let gameRunning = false;
        let isSlicing = false;
        let best = localStorage.getItem('fruitSliceBest') || 0;

        function spawnFruit() {
            const isBomb = Math.random() < 0.1;
            fruits.push({
                x: 50 + Math.random() * (canvas.width - 100),
                y: canvas.height + 30,
                vx: (Math.random() - 0.5) * 4,
                vy: -12 - Math.random() * 4,
                rotation: 0,
                rotSpeed: (Math.random() - 0.5) * 0.2,
                emoji: isBomb ? '💣' : fruitEmojis[Math.floor(Math.random() * fruitEmojis.length)],
                isBomb,
                size: 50,
                sliced: false
            });
        }

        function createSlice(fruit, dir) {
            const angle = Math.atan2(dir.y, dir.x);

            slices.push({
                x: fruit.x,
                y: fruit.y,
                vx: fruit.vx - 2,
                vy: fruit.vy - 1,
                rotation: fruit.rotation,
                rotSpeed: -0.1,
                emoji: fruit.emoji,
                alpha: 1
            });

            slices.push({
                x: fruit.x,
                y: fruit.y,
                vx: fruit.vx + 2,
                vy: fruit.vy - 1,
                rotation: fruit.rotation,
                rotSpeed: 0.1,
                emoji: fruit.emoji,
                alpha: 1
            });

            // Juice particles
            const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#ff9a00'];
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: fruit.x,
                    y: fruit.y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10 - 3,
                    size: 3 + Math.random() * 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    alpha: 1
                });
            }
        }

        function drawTrail() {
            if (trail.length < 2) return;

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            ctx.beginPath();
            ctx.moveTo(trail[0].x, trail[0].y);

            for (let i = 1; i < trail.length; i++) {
                const alpha = i / trail.length;
                ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.lineTo(trail[i].x, trail[i].y);
            }
            ctx.stroke();
        }

        function drawFruits() {
            fruits.forEach(f => {
                if (f.sliced) return;

                ctx.save();
                ctx.translate(f.x, f.y);
                ctx.rotate(f.rotation);
                ctx.font = `${f.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(f.emoji, 0, 0);
                ctx.restore();
            });
        }

        function drawSlices() {
            slices.forEach(s => {
                ctx.save();
                ctx.globalAlpha = s.alpha;
                ctx.translate(s.x, s.y);
                ctx.rotate(s.rotation);
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(s.emoji, 0, 0);
                ctx.restore();
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function update() {
            // Update fruits
            fruits.forEach(f => {
                f.vy += 0.3;
                f.x += f.vx;
                f.y += f.vy;
                f.rotation += f.rotSpeed;
            });

            // Check for missed fruits
            fruits = fruits.filter(f => {
                if (f.y > canvas.height + 50 && !f.sliced && !f.isBomb) {
                    misses++;
                    document.getElementById('misses').textContent = misses;
                    if (misses >= 3) gameOver();
                    return false;
                }
                return f.y < canvas.height + 100;
            });

            // Update slices
            slices.forEach(s => {
                s.vy += 0.3;
                s.x += s.vx;
                s.y += s.vy;
                s.rotation += s.rotSpeed;
                s.alpha -= 0.02;
            });
            slices = slices.filter(s => s.alpha > 0);

            // Update particles
            particles.forEach(p => {
                p.vy += 0.2;
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.03;
            });
            particles = particles.filter(p => p.alpha > 0);

            // Update trail
            trail = trail.filter((_, i) => i > trail.length - 20);

            // Spawn fruits
            if (Math.random() < 0.03 + score * 0.0001) {
                spawnFruit();
            }

            // Check slicing
            if (isSlicing && trail.length >= 2) {
                const last = trail[trail.length - 1];
                const prev = trail[trail.length - 2];

                fruits.forEach(f => {
                    if (f.sliced) return;

                    const dist = Math.hypot(f.x - last.x, f.y - last.y);
                    if (dist < f.size / 2 + 10) {
                        if (f.isBomb) {
                            gameOver();
                            return;
                        }

                        f.sliced = true;
                        score += 10;
                        document.getElementById('score').textContent = score;

                        createSlice(f, { x: last.x - prev.x, y: last.y - prev.y });
                    }
                });
            }
        }

        function gameOver() {
            gameRunning = false;
            if (score > best) {
                best = score;
                localStorage.setItem('fruitSliceBest', best);
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('bestScore').textContent = best;
            document.getElementById('gameover').classList.remove('hidden');
        }

        function startGame() {
            fruits = [];
            slices = [];
            particles = [];
            trail = [];
            score = 0;
            misses = 0;
            gameRunning = true;

            document.getElementById('score').textContent = '0';
            document.getElementById('misses').textContent = '0';
            document.getElementById('start').classList.add('hidden');
            document.getElementById('gameover').classList.add('hidden');

            gameLoop();
        }

        function gameLoop() {
            if (!gameRunning) return;

            // Background
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            update();
            drawParticles();
            drawSlices();
            drawFruits();
            drawTrail();

            requestAnimationFrame(gameLoop);
        }

        function handleMove(x, y) {
            if (isSlicing) {
                trail.push({ x, y });
            }
        }

        canvas.addEventListener('mousedown', () => { isSlicing = true; trail = []; });
        canvas.addEventListener('mouseup', () => { isSlicing = false; trail = []; });
        canvas.addEventListener('mouseleave', () => { isSlicing = false; trail = []; });
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            handleMove(e.clientX - rect.left, e.clientY - rect.top);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isSlicing = true;
            trail = [];
        });
        canvas.addEventListener('touchend', () => { isSlicing = false; trail = []; });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            handleMove(touch.clientX - rect.left, touch.clientY - rect.top);
        });
    </script>
    <script src="../../js/game-i18n.js"></script>
</body>

</html>
